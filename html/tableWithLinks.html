<!DOCTYPE html>
<html>
<head>
    <title>Table with List and Hyperlinks</title>
</head>
<body>

<h2>Learning Resources Table</h2>

 <table border="1" cellpadding="10" cellspacing="0">

    <tr>
        <th>Category</th>
        <th>Topics</th>
        <th>Website Link</th>
    </tr>
    <tr>
        <td>Programming</td>
        
        <td>
            <ul>
                <li>Python</li>
                <li>Java</li>
                <li>C++</li>
            </ul>
        </td>

        <td>
            <a href="https://www.w3schools.com" target="_blank">
                Visit W3Schools
            </a>
        </td>
    </tr>

    <tr>
        <td>Cloud</td>
        
        <td>
            <ol>
                <li>AWS</li>
                <li>Azure</li>
                <li>Google Cloud</li>
            </ol>
        </td>

        <td>
            <a href="https://aws.amazon.com" target="_blank">
                Visit AWS
            </a>
        </td>
    </tr>

</table>

</body>
</html>
