<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <label for="name">Name :</label>
    <input type="text" id="name"/> <br> <br>
        <label for="phone">Number :</label>
    <input type="tel" id="phone"/> <br> <br>
        <label for="email">email :</label>
    <input type="email" id="email"/> <br> <br>
    <label for="age">age :</label>
    <input type="number" id="age"/> <br> <br>

     <label for="gender">gender :</label> <br>
     <label for="">Male</label>
         <input type="radio" name="gender" id=""/> <br> <br>

     <label for="">Female</label>
         <input type="radio" name="gender" id=""/> <br> <br>

     <label for="">Others</label>
        <input type="radio" name="gender" id=""/> <br> <br>

        <p>Skills:</p>
        <label>Python: </label>
        <input checked type="checkbox" name="Skills">
        <label>Java: </label>
        <input type="checkbox" name="Skills">
        <label for="">Cloud: </label>
        <input type="checkbox" name="Skills"> <br> <br>

     <label for="password">password :</label>
    <input type="password" id="password"/> <br> <br>
     <label for="date">date :</label>
    <input type="date" id="date"/> <br> <br>
         <label for="range">Intelligence:</label>
     <input type="range" id="range"> <br><br>

     <select>
        <option selected disabled hidden="">Choose your language</option>
        <option value="">English</option>
        <option value="">Hindi</option>
        <option value="">Bengali</option>
     </select> <br> <br>

     <label for="file">upload file :</label>
    <input type="file" accept=".pdf" id="file"/> <br> <br>

    <button>submit</button>
    </form>
</body>
</html>
